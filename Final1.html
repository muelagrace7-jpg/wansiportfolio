<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Lab Task 1</title>
</head>
<style>


.close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    background:black;
    color: white;
    border-radius: 50%;
    text-align: center;
    line-height: 40px;
    font-weight: bold;
    cursor: pointer;
}

.fixed-box{
    position:fixed;
    bottom: 20px;
    right: 20px;
    width: 320px;
    height: 180px;
    background: rgb(156, 156, 156);
}
.product {
    position: relative;
    display:inline-block;
    margin: 100px;
    background: white;
    padding: 10px 40px 15px 10px;
    border: 1px solid #cccccc;
    
    
}

.product-img{
    height: auto;
    width: 300px;
}

.discount {
    position: absolute;
    top: 20px;
    right: 40px;
    background: black;
    color: white;
    padding: 8px 13px;
    font-size: 14px;
}

.cart-btn {
    position: absolute;
    bottom: 100px;
    left: 46.8%;
    padding: 10px 25px;
    border: 1px solid black;
    background: white;
    cursor: pointer;
    transform: translateX(-50%);
    
}

.colorgray {
    position: absolute;
    bottom: 0;
    width: 98.3%;
    height: 208px;
    background: rgba(255, 255, 255, 0.6);
}
</style>
<body>

  <div class="close-btn">X</div>

  <div class="product">
    <img src="tshirt.jpg" alt="Shirt" width="450px" height="550px">
    <span class="discount">20% OFF</span>
    <div class="colorgray"></div>
  <div><button class="cart-btn">Add to Cart</button></div>
</div>
  <div class="fixed-box"></div>


</body>
</html>
